<!DOCTYPE html>
<html>
<head>
    <title>Ürün Ekle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="mb-4">Ürün Ekle</h1>

<form method="post">
    <input type="text" name="name" placeholder="Ürün adı" class="form-control mb-3" required>
    <input type="number" name="quantity" placeholder="Miktar" class="form-control mb-3" required>
    <input type="number" name="price" placeholder="Fiyat" class="form-control mb-3" required>
    <button type="submit" class="btn btn-primary">Kaydet</button>
    <a href="/" class="btn btn-secondary ms-2">Geri</a>
</form>

</body>
</html>

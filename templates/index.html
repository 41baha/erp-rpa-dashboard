<!DOCTYPE html>
<html>
<head>
    <title>ERP Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Stok Listesi</h1>
    <a href="/logout" class="btn btn-danger">Çıkış</a>
</div>

<div class="mb-4">
    <a href="/add" class="btn btn-success">Ürün Ekle</a>

    <form action="/import" method="post" enctype="multipart/form-data" class="d-inline ms-2">
        <input type="file" name="file" class="form-control d-inline w-auto">
        <button type="submit" class="btn btn-primary">Excel Yükle</button>
    </form>

    <a href="/export" class="btn btn-secondary ms-2">Excel Export</a>
</div>

<!-- Ürün Tablosu -->
<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Ürün</th>
            <th>Miktar</th>
            <th>Fiyat</th>
            <th>İşlemler</th>
        </tr>
    </thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{p[0]}}</td>
            <td>{{p[1]}}</td>
            <td>{{p[2]}}</td>
            <td>{{p[3]}}</td>
            <td>
                <a href="/edit/{{p[0]}}" class="btn btn-sm btn-warning">Düzenle</a>
                <a href="/delete/{{p[0]}}" class="btn btn-sm btn-danger">Sil</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<!-- Grafik -->
<h3 class="mt-5">Ürün Miktarları</h3>
<canvas id="productChart" style="max-width:600px;"></canvas>

<script>
const ctx = document.getElementById('productChart').getContext('2d');
const labels = [{% for p in products %}'{{p[1]}}',{% endfor %}];
const data = {
    labels: labels,
    datasets: [{
        label: 'Miktar',
        data: [{% for p in products %}{{p[2]}},{% endfor %}],
        backgroundColor: 'rgba(54, 162, 235, 0.5)',
        borderColor: 'rgba(54, 162, 235, 1)',
        borderWidth: 1
    }]
};
const config = {
    type: 'bar',
    data: data,
    options: {
        scales: { y: { beginAtZero: true } }
    }
};
new Chart(ctx, config);
</script>

</body>
</html>

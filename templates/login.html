<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 350px;">
    <h3 class="text-center mb-4">Giriş Yap</h3>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        <input type="text" name="username" placeholder="Kullanıcı adı" class="form-control mb-3" required>
        <input type="password" name="password" placeholder="Şifre" class="form-control mb-3" required>
        <button type="submit" class="btn btn-primary w-100">Giriş</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Ürün Düzenle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="mb-4">Ürün Düzenle</h1>

<form method="post">
    <input type="text" name="name" class="form-control mb-3" value="{{product[1]}}" required>
    <input type="number" name="quantity" class="form-control mb-3" value="{{product[2]}}" required>
    <input type="number" name="price" class="form-control mb-3" value="{{product[3]}}" required>
    <button type="submit" class="btn btn-primary">Güncelle</button>
    <a href="/" class="btn btn-secondary ms-2">Geri</a>
</form>

</body>
</html>
